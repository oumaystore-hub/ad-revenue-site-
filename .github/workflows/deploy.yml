name: Deploy Astro Site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch: # يسمح بالنشر اليدوي من تبويب Actions

# الصلاحيات المطلوبة للنشر الآمن على GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# منع تداخل عمليات النشر المتزامنة
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🛠️ Build Project (Includes Sitemap Generation)
        run: npm run build

      - name: 📤 Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
